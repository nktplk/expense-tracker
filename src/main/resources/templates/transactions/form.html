<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Расход</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4"
                th:text="${transaction.id != null} ? 'Редактировать расход' : 'Добавить расход'"></h2>
            <form method="post"
                  th:action="${transaction.id != null} ? @{/transactions/edit/{id}(id=${transaction.id})} : @{/transactions/save}">
                <div class="mb-3">
                    <label class="form-label">Сумма</label>
                    <input type="number" step="0.01" name="amount"
                           th:value="${transaction.amount}"
                           class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Описание</label>
                    <input type="text" name="description"
                           th:value="${transaction.description}"
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Категория</label>
                    <select name="category.id" class="form-select" required>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${transaction.category != null and transaction.category.id == cat.id}">
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Попутчики (необязательно)</label>
                    <select name="companionIds" class="form-select" multiple>
                        <option th:each="u : ${users}"
                                th:value="${u.id}"
                                th:text="${u.username}"
                                th:selected="${transaction.companions != null and transaction.companions.contains(u)}">
                        </option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100">Сохранить</button>
                <a th:href="@{/dashboard}" class="btn btn-secondary w-100 mt-2">Отмена</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
