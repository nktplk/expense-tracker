<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${transaction.id != null} ? 'Редактирование транзакции - ExTrack' : 'Новая транзакция - ExTrack'">Транзакция</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --brand-color: #5850EC;
            --brand-hover: #463bce;
            --bg-light: #F4F6F9;
            --text-main: #2B2D42;
            --text-muted: #8D99AE;
            --card-radius: 20px;
            --input-radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Десктопный сайдбар */
        .sidebar {
            background-color: var(--brand-color);
            color: white;
            min-height: 100vh;
            width: 260px;
            border-top-right-radius: 24px;
            border-bottom-right-radius: 24px;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        .nav-link-custom {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .nav-link-custom:hover, .nav-link-custom.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.15);
        }

        .nav-link-custom i {
            font-size: 1.2rem;
        }

        /* Основной контент */
        .main-wrapper {
            margin-left: 260px;
            padding: 2.5rem 3rem;
        }

        /* Элементы UI */
        .ui-card {
            background: white;
            border-radius: var(--card-radius);
            border: none;
            box-shadow: 0px 8px 24px rgba(149, 157, 165, 0.08);
            padding: 2.5rem;
        }

        .form-label {
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: var(--input-radius);
            padding: 0.8rem 1.2rem;
            border: 1px solid #E2E8F0;
            background-color: #F8FAFC;
            transition: all 0.2s;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .form-control:focus, .form-select:focus {
            background-color: white;
            border-color: var(--brand-color);
            box-shadow: 0 0 0 4px rgba(88, 80, 236, 0.1);
        }

        /* Стилизация input-group */
        .input-group-text {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-top-left-radius: var(--input-radius);
            border-bottom-left-radius: var(--input-radius);
        }

        .input-group > .form-control, .input-group > .form-select {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        /* Множественный выбор */
        select[multiple].form-select {
            padding: 0.5rem;
            border-radius: var(--input-radius);
        }

        select[multiple] option {
            padding: 0.6rem 1rem;
            border-radius: 8px;
            margin-bottom: 2px;
            transition: background-color 0.2s;
        }

        select[multiple] option:checked {
            background-color: var(--brand-color);
            color: white;
        }

        /* Кнопки */
        .btn-brand {
            background-color: var(--brand-color);
            color: white;
            border-radius: var(--input-radius);
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            border: none;
            transition: all 0.3s;
        }

        .btn-brand:hover {
            background-color: var(--brand-hover);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(88, 80, 236, 0.2);
        }

        .btn-light-custom {
            background-color: white;
            color: var(--text-main);
            border: 1px solid #E2E8F0;
            border-radius: var(--input-radius);
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-light-custom:hover {
            background-color: #F8FAFC;
            border-color: #CBD5E1;
        }

        /* Аватарка в шапке */
        .profile-avatar {
            width: 44px;
            height: 44px;
            background-color: #FFA6A6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Мобильное нижнее меню */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            box-shadow: 0px -4px 24px rgba(0,0,0,0.06);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 0.5rem 1.5rem;
            padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
            z-index: 1000;
            justify-content: space-between;
            align-items: center;
        }

        .mobile-nav-item {
            color: var(--text-muted);
            font-size: 1.4rem;
            text-decoration: none;
            padding: 10px;
            transition: color 0.2s;
        }

        .mobile-nav-item.active {
            color: var(--brand-color);
        }

        .fab-button {
            width: 56px;
            height: 56px;
            background-color: var(--brand-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0px 8px 20px rgba(88, 80, 236, 0.3);
            transform: translateY(-20px);
            text-decoration: none;
        }

        /* Адаптив */
        @media (max-width: 991px) {
            .sidebar {
                display: none;
            }
            .main-wrapper {
                margin-left: 0;
                padding: 1.5rem 1rem;
                padding-bottom: 100px;
            }
            .mobile-nav {
                display: flex;
            }
            .ui-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <a href="#" class="brand-logo">
        <i class="bi bi-wallet2"></i> ExTrack
    </a>
    <nav class="d-flex flex-column flex-grow-1">
        <a th:href="@{/}" class="nav-link-custom active">
            <i class="bi bi-grid-fill"></i> Главная
        </a>
        <a th:href="@{/accounts}" class="nav-link-custom">
            <i class="bi bi-credit-card-fill"></i> Счета и Карты
        </a>
        <a th:href="@{/family}" class="nav-link-custom">
            <i class="bi bi-people-fill"></i> Моя семья
        </a>
        <a th:href="@{/categories}" class="nav-link-custom">
            <i class="bi bi-tags-fill"></i> Категории
        </a>

        <div class="mt-auto">
            <a sec:authorize="hasRole('MANAGER')" th:href="@{/manager/users}" class="nav-link-custom mb-2">
                <i class="bi bi-shield-lock-fill"></i> Пользователи
            </a>
            <a sec:authorize="hasAnyRole('OWNER', 'MANAGER')" th:href="@{/profile}" class="nav-link-custom">
                <i class="bi bi-gear-fill"></i> Настройки
            </a>
            <form method="post" th:action="@{/logout}" class="mt-2">
                <button type="submit" class="nav-link-custom w-100 border-0 text-start" style="background: transparent;">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </button>
            </form>
        </div>
    </nav>
</aside>

<main class="main-wrapper">

    <header class="d-flex justify-content-between align-items-center mb-4 mb-lg-5">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/dashboard}" class="btn btn-light rounded-circle d-flex align-items-center justify-content-center border-0 shadow-sm" style="width: 40px; height: 40px;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <h2 class="fw-bold m-0" style="color: #11142D;" th:text="${transaction.id != null} ? 'Редактировать расход' : 'Новая транзакция'"></h2>
        </div>
    </header>

    <div class="row justify-content-center justify-content-xl-start">
        <div class="col-xl-6 col-lg-8 col-md-10">
            <div class="ui-card">

                <form method="post" th:action="${transaction.id != null} ? @{/transactions/edit/{id}(id=${transaction.id})} : @{/transactions/save}">

                    <div class="mb-4">
                        <label class="form-label">Сумма</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-cash-stack text-muted"></i></span>
                            <input type="number" step="0.01" name="amount" th:value="${transaction.amount}" class="form-control border-start-0 fw-bold" required placeholder="0.00" style="font-size: 1.25rem;">
                            <span class="input-group-text border-start-0 bg-transparent text-muted fw-bold">BYN</span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Описание</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-card-text text-muted"></i></span>
                            <input type="text" name="description" th:value="${transaction.description}" class="form-control border-start-0" placeholder="Например: Покупка продуктов">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Категория</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-tags text-muted"></i></span>
                            <select name="category.id" class="form-select border-start-0" required>
                                <option value="" disabled th:selected="${transaction.category == null}">Выберите категорию...</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"
                                        th:selected="${transaction.category != null and transaction.category.id == cat.id}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="form-label">Попутчики (совместный расход)</label>
                        <select name="companionIds" class="form-select" multiple style="min-height: 120px;">
                            <option th:each="u : ${users}"
                                    th:value="${u.id}"
                                    th:text="${u.username}"
                                    th:selected="${transaction.companions != null and transaction.companions.contains(u)}">
                            </option>
                        </select>
                        <div class="form-text mt-2"><i class="bi bi-info-circle me-1"></i>Удерживайте <kbd>Ctrl</kbd> (или <kbd>Cmd</kbd> на Mac) для выбора нескольких участников. Оставьте пустым для личного расхода.</div>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-3 mt-2">
                        <button type="submit" class="btn btn-brand flex-grow-1 py-2">
                            <i class="bi bi-check-circle me-2"></i>Сохранить транзакцию
                        </button>
                        <a th:href="@{/dashboard}" class="btn btn-light-custom flex-grow-1 text-center text-decoration-none py-2">
                            Отмена
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</main>

<nav class="mobile-nav d-lg-none">
    <a th:href="@{/}" class="mobile-nav-item active">
        <i class="bi bi-house-door-fill"></i>
    </a>
    <a th:href="@{/accounts}" class="mobile-nav-item">
        <i class="bi bi-credit-card-fill"></i>
    </a>

    <a th:href="@{/transactions/new}" class="fab-button">
        <i class="bi bi-plus"></i>
    </a>

    <a th:href="@{/family}" class="mobile-nav-item">
        <i class="bi bi-people"></i>
    </a>
    <a sec:authorize="hasAnyRole('OWNER', 'MANAGER')" th:href="@{/profile}" class="mobile-nav-item">
        <i class="bi bi-person-fill"></i>
    </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
