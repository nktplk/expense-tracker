<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h3>Мой профиль</h3>
            <div th:if="${param.saved}" class="alert alert-success">Сохранено!</div>
            <form method="post" th:action="@{/profile}">
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input type="text" class="form-control" th:value="${user.username}" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" th:value="${user.email}"
                           class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Новый пароль (оставьте пустым если не меняете)</label>
                    <input type="password" name="password" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary w-100">Сохранить</button>
                <a th:href="@{/dashboard}" class="btn btn-secondary w-100 mt-2">Назад</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
