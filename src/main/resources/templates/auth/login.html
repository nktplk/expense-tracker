<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - ExTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --brand-color: #5850EC;
            --brand-hover: #463bce;
            --bg-light: #F4F6F9;
            --text-main: #2B2D42;
            --text-muted: #8D99AE;
            --card-radius: 24px;
            --input-radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* Карточка авторизации */
        .auth-card {
            background: white;
            border-radius: var(--card-radius);
            box-shadow: 0px 10px 40px rgba(149, 157, 165, 0.1);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
        }

        .brand-logo-icon {
            font-size: 3rem;
            color: var(--brand-color);
            line-height: 1;
        }

        /* Элементы форм */
        .form-label {
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: var(--input-radius);
            padding: 0.8rem 1rem;
            border: 1px solid #E2E8F0;
            background-color: #F8FAFC;
            transition: all 0.2s;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .form-control:focus {
            background-color: white;
            border-color: var(--brand-color);
            box-shadow: 0 0 0 4px rgba(88, 80, 236, 0.1);
        }

        /* Стилизация input-group */
        .input-group-text {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-top-left-radius: var(--input-radius);
            border-bottom-left-radius: var(--input-radius);
            color: var(--text-muted);
        }

        .input-group > .form-control {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        /* Кнопка */
        .btn-brand {
            background-color: var(--brand-color);
            color: white;
            border-radius: var(--input-radius);
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            border: none;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-brand:hover {
            background-color: var(--brand-hover);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(88, 80, 236, 0.25);
        }

        /* Ссылка-переход */
        .auth-link {
            color: var(--brand-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .auth-link:hover {
            color: var(--brand-hover);
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="auth-card">

    <div class="text-center mb-4">
        <div class="brand-logo-icon mb-2">
            <i class="bi bi-wallet2"></i>
        </div>
        <h3 class="fw-bold m-0" style="color: #11142D;">С возвращением</h3>
        <p class="text-muted mt-2 mb-0" style="font-size: 0.95rem;">Войдите в аккаунт, чтобы продолжить</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger border-0 shadow-sm d-flex align-items-center py-2 px-3 mb-4" style="border-radius: 12px; background-color: #FEF2F2; color: #DC2626; font-size: 0.9rem;">
        <i class="bi bi-exclamation-triangle-fill fs-5 me-2"></i> <span>Неверный логин или пароль.</span>
    </div>

    <div th:if="${param.registered}" class="alert alert-success border-0 shadow-sm d-flex align-items-center py-2 px-3 mb-4" style="border-radius: 12px; background-color: #ECFDF5; color: #10B981; font-size: 0.9rem;">
        <i class="bi bi-check-circle-fill fs-5 me-2"></i> <span>Регистрация успешна! Войдите в систему.</span>
    </div>

    <form method="post" th:action="@{/login}">

        <div class="mb-3">
            <label class="form-label">Имя пользователя</label>
            <div class="input-group">
                <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control border-start-0" placeholder="Ваш логин" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Пароль</label>
            <div class="input-group">
                <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control border-start-0" placeholder="Введите пароль" required>
            </div>
        </div>

        <button type="submit" class="btn btn-brand w-100 mb-4">
            Войти в систему
        </button>

    </form>

    <div class="text-center mt-2">
        <span class="text-muted" style="font-size: 0.95rem;">Нет аккаунта?</span>
        <a th:href="@{/register}" class="auth-link ms-1" style="font-size: 0.95rem;">Зарегистрироваться</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
