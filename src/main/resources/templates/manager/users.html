<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Пользователи</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h3>Управление пользователями</h3>
    <a th:href="@{/dashboard}" class="btn btn-secondary mb-3">← Назад</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th><th>Логин</th><th>Email</th>
            <th>Роль</th><th>Статус</th><th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td>
                <form method="post" th:action="@{/manager/users/{id}/role(id=${u.id})}" class="d-inline">
                    <select name="role" class="form-select form-select-sm d-inline w-auto"
                            onchange="this.form.submit()">
                        <option th:each="r : ${ {'CLIENT','OWNER','MANAGER'} }"
                                th:value="${r}" th:text="${r}"
                                th:selected="${u.role.name() == r}"></option>
                    </select>
                </form>
            </td>
            <td>
                <span th:if="${u.enabled}" class="badge bg-success">Активен</span>
                <span th:unless="${u.enabled}" class="badge bg-danger">Заблокирован</span>
            </td>
            <td>
                <form method="post" th:action="@{/manager/users/{id}/toggle(id=${u.id})}" class="d-inline">
                    <button class="btn btn-sm"
                            th:classappend="${u.enabled} ? 'btn-warning' : 'btn-success'"
                            th:text="${u.enabled} ? 'Заблокировать' : 'Разблокировать'"></button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
