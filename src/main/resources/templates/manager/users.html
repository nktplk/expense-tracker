<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями - ExTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --brand-color: #5850EC;
            --brand-hover: #463bce;
            --bg-light: #F4F6F9;
            --text-main: #2B2D42;
            --text-muted: #8D99AE;
            --card-radius: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Десктопный сайдбар */
        .sidebar {
            background-color: var(--brand-color);
            color: white;
            min-height: 100vh;
            width: 260px;
            border-top-right-radius: 24px;
            border-bottom-right-radius: 24px;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        .nav-link-custom {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .nav-link-custom:hover, .nav-link-custom.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.15);
        }

        .nav-link-custom i {
            font-size: 1.2rem;
        }

        /* Основной контент */
        .main-wrapper {
            margin-left: 260px;
            padding: 2.5rem 3rem;
        }

        /* Элементы UI */
        .ui-card {
            background: white;
            border-radius: var(--card-radius);
            border: none;
            box-shadow: 0px 8px 24px rgba(149, 157, 165, 0.08);
            padding: 2rem;
        }

        /* Кастомная таблица */
        .table-custom {
            margin-bottom: 0;
        }
        .table-custom th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #F1F5F9;
            padding-bottom: 1rem;
            border-top: none;
        }
        .table-custom td {
            vertical-align: middle;
            border-bottom: 1px solid #F8FAFC;
            padding: 1.2rem 0.5rem;
        }
        .table-custom tbody tr:hover {
            background-color: #F8FAFC;
        }

        /* Аватарка списка */
        .user-avatar {
            width: 42px;
            height: 42px;
            background-color: #E0E7FF;
            color: var(--brand-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Статусы */
        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .status-active {
            background-color: #ECFDF5;
            color: #10B981;
        }
        .status-blocked {
            background-color: #FEF2F2;
            color: #EF4444;
        }

        /* Мобильное нижнее меню */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            box-shadow: 0px -4px 24px rgba(0,0,0,0.06);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 0.5rem 1.5rem;
            padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
            z-index: 1000;
            justify-content: space-between;
            align-items: center;
        }

        .mobile-nav-item {
            color: var(--text-muted);
            font-size: 1.4rem;
            text-decoration: none;
            padding: 10px;
            transition: color 0.2s;
        }

        .mobile-nav-item.active {
            color: var(--brand-color);
        }

        .fab-button {
            width: 56px;
            height: 56px;
            background-color: var(--brand-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0px 8px 20px rgba(88, 80, 236, 0.3);
            transform: translateY(-20px);
            text-decoration: none;
        }

        /* Адаптив */
        @media (max-width: 991px) {
            .sidebar {
                display: none;
            }
            .main-wrapper {
                margin-left: 0;
                padding: 1.5rem 1rem;
                padding-bottom: 100px;
            }
            .mobile-nav {
                display: flex;
            }
            .ui-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <a href="#" class="brand-logo">
        <i class="bi bi-wallet2"></i> ExTrack
    </a>
    <nav class="d-flex flex-column flex-grow-1">
        <a th:href="@{/dashboard}" class="nav-link-custom">
            <i class="bi bi-grid-fill"></i> Главная
        </a>
        <a th:href="@{/accounts}" class="nav-link-custom">
            <i class="bi bi-credit-card-fill"></i> Счета и Карты
        </a>
        <a th:href="@{/family}" class="nav-link-custom">
            <i class="bi bi-people-fill"></i> Моя семья
        </a>
        <a th:href="@{/categories}" class="nav-link-custom">
            <i class="bi bi-tags-fill"></i> Категории
        </a>

        <div class="mt-auto">
            <a sec:authorize="hasRole('MANAGER')" th:href="@{/manager/users}" class="nav-link-custom active mb-2 bg-dark bg-opacity-25">
                <i class="bi bi-shield-lock-fill"></i> Пользователи
            </a>
            <a sec:authorize="hasAnyRole('OWNER', 'MANAGER')" th:href="@{/profile}" class="nav-link-custom">
                <i class="bi bi-gear-fill"></i> Настройки
            </a>
            <form method="post" th:action="@{/logout}" class="mt-2">
                <button type="submit" class="nav-link-custom w-100 border-0 text-start" style="background: transparent;">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </button>
            </form>
        </div>
    </nav>
</aside>

<main class="main-wrapper">

    <header class="d-flex justify-content-between align-items-center mb-4 mb-lg-5">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/dashboard}" class="btn btn-light rounded-circle d-flex align-items-center justify-content-center border-0 shadow-sm" style="width: 40px; height: 40px;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h2 class="fw-bold m-0" style="color: #11142D;">Пользователи</h2>
                <span class="text-muted d-none d-sm-block" style="font-size: 0.9rem;">Управление доступом и ролями платформы</span>
            </div>
        </div>
    </header>

    <div class="ui-card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover table-custom">
                <thead>
                <tr>
                    <th scope="col" style="width: 50px;" class="d-none d-sm-table-cell">ID</th>
                    <th scope="col">Пользователь</th>
                    <th scope="col" style="width: 200px;">Роль</th>
                    <th scope="col">Статус</th>
                    <th scope="col" class="text-end">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td class="text-muted fw-medium d-none d-sm-table-cell" th:text="${'#' + u.id}">#1</td>

                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <div class="user-avatar">
                                <span th:text="${#strings.substring(u.username, 0, 1).toUpperCase()}">U</span>
                            </div>
                            <div>
                                <div class="fw-bold text-dark" style="font-size: 1.05rem;" th:text="${u.username}">Username</div>
                                <div class="text-muted" style="font-size: 0.85rem;" th:text="${u.email}">email@example.com</div>
                            </div>
                        </div>
                    </td>

                    <td>
                        <form method="post" th:action="@{/manager/users/{id}/role(id=${u.id})}" class="m-0">
                            <select name="role" class="form-select form-select-sm border-0 bg-light rounded-3 fw-medium"
                                    onchange="this.form.submit()" style="cursor: pointer;">
                                <option th:each="r : ${ {'CLIENT','OWNER','MANAGER'} }"
                                        th:value="${r}" th:text="${r}"
                                        th:selected="${u.role.name() == r}"></option>
                            </select>
                        </form>
                    </td>

                    <td>
                                <span th:if="${u.enabled}" class="status-badge status-active">
                                    <i class="bi bi-circle-fill" style="font-size: 0.5rem;"></i> Активен
                                </span>
                        <span th:unless="${u.enabled}" class="status-badge status-blocked">
                                    <i class="bi bi-slash-circle" style="font-size: 0.8rem;"></i> Заблокирован
                                </span>
                    </td>

                    <td class="text-end">
                        <form method="post" th:action="@{/manager/users/{id}/toggle(id=${u.id})}" class="m-0">

                            <button th:if="${u.enabled}" class="btn btn-sm" style="background-color: #FEF2F2; color: #EF4444; border-radius: 8px; font-weight: 600;" title="Заблокировать">
                                <i class="bi bi-lock-fill"></i> <span class="d-none d-lg-inline ms-1">Блок</span>
                            </button>

                            <button th:unless="${u.enabled}" class="btn btn-sm" style="background-color: #ECFDF5; color: #10B981; border-radius: 8px; font-weight: 600;" title="Разблокировать">
                                <i class="bi bi-unlock-fill"></i> <span class="d-none d-lg-inline ms-1">Разблок</span>
                            </button>

                        </form>
                    </td>
                </tr>
                <tr th:if="${users == null or users.isEmpty()}">
                    <td colspan="5" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        Список пользователей пуст
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<nav class="mobile-nav d-lg-none">
    <a th:href="@{/dashboard}" class="mobile-nav-item">
        <i class="bi bi-house-door-fill"></i>
    </a>
    <a th:href="@{/accounts}" class="mobile-nav-item">
        <i class="bi bi-credit-card-fill"></i>
    </a>

    <a th:href="@{/manager/users}" class="fab-button">
        <i class="bi bi-shield-lock-fill"></i>
    </a>

    <a th:href="@{/categories}" class="mobile-nav-item">
        <i class="bi bi-tags-fill"></i>
    </a>
    <a sec:authorize="hasAnyRole('OWNER', 'MANAGER')" th:href="@{/profile}" class="mobile-nav-item">
        <i class="bi bi-person-fill"></i>
    </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
