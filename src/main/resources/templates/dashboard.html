<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">ExpenseTracker</a>
        <div class="ms-auto">
            <span class="text-white me-3" th:text="${user.username}">Username</span>

            <a sec:authorize="hasAnyRole('OWNER', 'MANAGER')"
               th:href="@{/categories}"
               class="btn btn-outline-light btn-sm me-2">Категории</a>

            <a sec:authorize="hasAnyRole('OWNER', 'MANAGER')"
               th:href="@{/profile}"
               class="btn btn-outline-light btn-sm me-2">Профиль</a>

            <a sec:authorize="hasRole('MANAGER')"
               th:href="@{/manager/users}"
               class="btn btn-outline-light btn-sm me-2">Пользователи</a>

            <form method="post" th:action="@{/logout}" class="d-inline">
                <button class="btn btn-outline-light btn-sm">Выйти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-3">
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h6 class="card-title">Расходы за месяц</h6>
                    <h2 class="card-text" th:text="${monthTotal} + ' BYN'"></h2>
                </div>
            </div>
        </div>
    </div>
    <h4>Мои транзакции</h4>
    <a th:href="@{/transactions/new}"
       class="btn btn-success mb-3">+ Добавить расход</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Дата</th>
            <th>Категория</th>
            <th>Описание</th>
            <th>Сумма</th>
            <th>Попутчики</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${transactions}">
            <td th:text="${#temporals.format(t.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
            <td th:text="${t.category.name}"></td>
            <td th:text="${t.description}"></td>
            <td th:text="${t.amount} + ' BYN'"></td>
            <td>
                <span th:each="c, i : ${t.companions}">
                    <span th:text="${c.username}"></span>
                    <span th:if="${!i.last}">, </span>
                </span>
            </td>
            <td>
                <a th:href="@{/transactions/edit/{id}(id=${t.id})}"
                   class="btn btn-sm btn-warning">Изменить</a>
                <form method="post"
                      th:action="@{/transactions/delete/{id}(id=${t.id})}"
                      class="d-inline">
                    <button class="btn btn-sm btn-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
