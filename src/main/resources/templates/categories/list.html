<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Категории</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h3>Категории</h3>
    <a th:href="@{/dashboard}" class="btn btn-secondary mb-2">← Назад</a>
    <a th:href="@{/categories/new}" class="btn btn-success mb-2">+ Новая категория</a>
    <table class="table table-striped">
        <thead>
        <tr><th>Название</th><th>Лимит</th><th>Тип</th><th>Действия</th></tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.name}"></td>
            <td th:text="${cat.owner == null and user.family != null and user.family.customLimits.containsKey(cat)}
                         ? ${user.family.customLimits.get(cat)} + ' BYN (Лимит семьи)'
                         : (${cat.monthlyLimit != null} ? ${cat.monthlyLimit} + ' BYN' : '—')"></td>
            <td>
                <span th:if="${cat.owner == null}" class="badge bg-secondary">Системная</span>
                <span th:unless="${cat.owner == null}" class="badge bg-primary">Личная</span>
            </td>
            <td>
                <a th:if="${cat.owner != null}"
                   th:href="@{/categories/edit/{id}(id=${cat.id})}"
                   class="btn btn-sm btn-warning">Изменить</a>
                <form th:if="${cat.owner != null}" method="post"
                      th:action="@{/categories/delete/{id}(id=${cat.id})}" class="d-inline">
                    <button class="btn btn-sm btn-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
